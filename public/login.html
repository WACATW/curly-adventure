<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:linear-gradient(135deg,#ffd6e0,#e2d5fb,#d7f0eb);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{width:90%;max-width:450px;background:rgba(255,255,255,.92);border-radius:16px;padding:2.5rem}
h2{text-align:center;color:#e2a8c0;margin-bottom:1.5rem;font-size:32px}
input{width:100%;padding:.8rem;margin:.6rem 0;border:1px #ddd solid;border-radius:8px;font-size:1rem}
button{width:100%;padding:.8rem;margin-top:1rem;background:#e2a8c0;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer}
button:hover{background:#d897b0}
a{display:block;text-align:center;margin-top:1rem;color:#e2a8c0;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<div class="box">
  <h2>账号登录</h2>
  <input id="uname" placeholder="用户名">
  <input id="pwd" type="password" placeholder="密码">
  <button type="button" id="loginBtn">登录</button>
  <a href="register.html">没有账号？去注册</a>
</div>

<script>
// 使用addEventListener稳定绑定点击
const loginBtn = document.getElementById('loginBtn');
loginBtn.addEventListener('click', async function(){
  const username = document.getElementById('uname').value.trim();
  const password = document.getElementById('pwd').value.trim();
  if(!username||!password) return alert('请输入账号密码');
  try{
    const res = await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    })
    const data = await res.json();
    alert(data.msg);
    if(data.code===200){
      localStorage.setItem('token',data.data.token);
      localStorage.setItem('username',data.data.username);
      localStorage.setItem('isAdmin',data.data.isAdmin);
      location.href='index.html';
    }
  }catch(err){
    alert('网络错误，请确认服务正常启动');
    console.error(err);
  }
})
</script>
</body>
</html>
