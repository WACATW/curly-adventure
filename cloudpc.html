<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云电脑 - 一只猫的小家</title>
  <style>
    /* 复用index.html的样式风格 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }
    body {
      background: linear-gradient(to bottom right, #fde2e4, #e2dafa, #d7f0e6);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 90%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container" id="content">
    <!-- 内容会根据登录状态动态渲染 -->
  </div>

  <script>
    // 页面加载时验证权限
    async function checkAuth() {
      const token = localStorage.getItem('token');
      const content = document.getElementById('content');

      if (!token) {
        content.innerHTML = `
          <h2 style="color:#e2a8c0;">请先登录</h2>
          <p style="margin:2rem 0;">您需要登录后才能访问云电脑功能</p>
          <a href="login.html" style="padding:0.6rem 1.2rem; background:#e2a8c0; color:white; border-radius:8px; text-decoration:none;">前往登录</a>
        `;
        return;
      }

      try {
        // 调用受保护的云电脑接口
        const res = await fetch('http://localhost:3000/api/cloudpc', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        if (data.code === 200) {
          content.innerHTML = `
            <h2 style="color:#2d3748; margin-bottom:2rem;">云电脑专区</h2>
            <p style="color:#4a5568;">欢迎 ${data.data.username} 使用云电脑服务！</p>
            <!-- 这里添加云电脑的实际功能 -->
          `;
        } else {
          localStorage.removeItem('token');
          localStorage.removeItem('username');
          content.innerHTML = `
            <h2 style="color:#e2a8c0;">登录已过期</h2>
            <p style="margin:2rem 0;">请重新登录</p>
            <a href="login.html" style="padding:0.6rem 1.2rem; background:#e2a8c0; color:white; border-radius:8px; text-decoration:none;">前往登录</a>
          `;
        }
      } catch (err) {
        content.innerHTML = `
          <h2 style="color:#e2a8c0;">网络错误</h2>
          <p style="margin:2rem 0;">请检查后端服务是否启动</p>
        `;
        console.error(err);
      }
    }

    window.onload = checkAuth;
  </script>
</body>
</html>
