<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>网盘 - 一只猫的小家</title>
  <style>
    /* 清除浏览器默认边距，给百分比高度提供基准 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%; /* 关键：父层必须显式100%高度，否则iframe高度失效 */
      overflow: hidden; /* 隐藏页面滚动条，不留白边 */
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none; /* 去掉iframe默认灰色边框 */
    }
  </style>
</head>
  <body>
  <iframe src="https://wacatw-pan.hf.space" allowfullscreen></iframe>
   </body>
</html>
