<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏大厅 - 选择你想玩的游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #12121a;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 50px;
            color: #42a5f5;
        }
        /* 游戏网格布局 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }
        /* 游戏卡片 */
        .game-card {
            background: #1e1e2f;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: #42a5f5;
            box-shadow: 0 8px 24px rgba(66, 165, 245, 0.3);
        }
        .game-icon {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        .game-name {
            padding: 14px;
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 游戏大厅</h1>
        <h2>注意:以下游戏均为嵌入快捷链接,不作为商业用途仅供娱乐,如侵权请联系</h2>
        <div class="game-grid" id="gameList"></div>
    </div>

    <script>
        // 游戏配置列表（在这里添加/修改游戏）
        const gameData = [
            {
                id: 1,
                name: "盖瑞模组",
                icon: "https://www.play-games.com/files/img/gamers-mod-1778754228.jpg",
                gameUrl: "https://www.play-games.com/iframe/40486.html"
            },
            {
                id: 2,
                name: "模拟gta",
                icon: "https://www.play-games.com/files/img/criminal-russia-3d-1721566324.jpg",
                gameUrl: "https://www.play-games.com/iframe/37937.html"
            },
            {
                id: 3,
                name: "我的世界",
                icon: "https://www.play-games.com/files/img/messcraft-minecraft-clone-1763033221.jpg",
                gameUrl: "https://www.play-games.com/iframe/39611.html"
            },
            {
                id: 4,
                name: "想吃蛋糕的熊",
                icon: "https://www.play-games.com/files/img/la-madriguera-1779946959.jpg",
                gameUrl: "https://www.play-games.com/iframe/40556.html"
            },
            {
                id: 5,
                name: "FNF周五夜放克：腐化重制版",
                icon: "https://www.play-games.com/files/img/friday-night-funkin-corruption-reimagined-1646050482.jpg",
                gameUrl: "https://www.play-games.com/iframe/30077.html"
            },
            {
                id: 6,
                name: "问题精灵",
                icon: "https://www.play-games.com/files/img/akinator-1742475008.jpg",
                gameUrl: "https://www.play-games.com/iframe/38659.html"
            },
            {
                id: 7,
                name: "backroom后室",
                icon: "https://www.play-games.com/files/img/backrooms-1781693830.webp",
                gameUrl: "https://www.play-games.com/iframe/30998.html"
            },
            {
                id: 8,
                name: "警察模拟器",
                icon: "https://origin.play-games.com/files/video/police-car-simulator-game-criminal-case-1777896142.mp4",
                gameUrl: "https://www.play-games.com/iframe/40437.html"
            },
            {
                id: 9,
                name: "战争模拟器",
                icon: "https://static.playhop.com/images/4db65_6300668_6d55e/318e85bff/2a000001954bf9fc_26506a3/9339abc6fdbfc0a5b575_17b807/pjpg128x128",
                gameUrl: "https://www.play-games.com/iframe/40338.html"
            },
            {
                id: 10,
                name: "Amongus太空狼人杀",
                icon: "https://www.play-games.com/files/img/among-us-single-player-1748172132.png",
                gameUrl: "https://www.play-games.com/iframe/26391.html"
            }
        ];

        // 渲染游戏列表
        const gameListEl = document.getElementById("gameList");
        gameData.forEach(game => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.innerHTML = `
                <img class="game-icon" src="${game.icon}" alt="${game.name}">
                <div class="game-name">${game.name}</div>
            `;
            // 点击新开页面，传递游戏地址参数
            card.onclick = () => {
                window.open(`play.html?url=${encodeURIComponent(game.gameUrl)}`, "_blank");
            };
            gameListEl.appendChild(card);
        });
    </script>
</body>
</html>
