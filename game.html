<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏大厅 - 选择你想玩的游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #12121a;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 50px;
            color: #42a5f5;
        }
        /* 游戏网格布局 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }
        /* 游戏卡片 */
        .game-card {
            background: #1e1e2f;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: #42a5f5;
            box-shadow: 0 8px 24px rgba(66, 165, 245, 0.3);
        }
        .game-icon {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        .game-name {
            padding: 14px;
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 游戏大厅</h1>
        <div class="game-grid" id="gameList"></div>
    </div>

    <script>
        // 游戏配置列表（在这里添加/修改游戏）
        const gameData = [
            {
                id: 1,
                name: "迷你闯关",
                icon: "https://picsum.photos/id/237/400/300",
                gameUrl: "https://example-game1.com/play"
            },
            {
                id: 2,
                name: "赛车竞速",
                icon: "https://picsum.photos/id/1072/400/300",
                gameUrl: "https://example-game2.com/play"
            },
            {
                id: 3,
                name: "射击小游戏",
                icon: "https://picsum.photos/id/96/400/300",
                gameUrl: "https://example-game3.com/play"
            },
            {
                id: 4,
                name: "益智消除",
                icon: "https://picsum.photos/id/1068/400/300",
                gameUrl: "https://example-game4.com/play"
            }
        ];

        // 渲染游戏列表
        const gameListEl = document.getElementById("gameList");
        gameData.forEach(game => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.innerHTML = `
                <img class="game-icon" src="${game.icon}" alt="${game.name}">
                <div class="game-name">${game.name}</div>
            `;
            // 点击新开页面，传递游戏地址参数
            card.onclick = () => {
                window.open(`play.html?url=${encodeURIComponent(game.gameUrl)}`, "_blank");
            };
            gameListEl.appendChild(card);
        });
    </script>
</body>
</html>
