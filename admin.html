<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>管理员审核后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{
  background:linear-gradient(135deg,#fde2e4,#e2dafa,#d7f0eb);
  min-height:100vh;
  padding:30px;
}
.box{
  width:92%;
  max-width:900px;
  margin:0 auto;
  background:rgba(255,255,255,0.92);
  border-radius:18px;
  padding:2rem;
}
h2{color:#e2a8c0;margin-bottom:20px}
.item{background:#fff;padding:15px;border-radius:8px;margin:10px 0;display:flex;justify-content:space-between;align-items:center;border:1px #eee solid}
.btn-pass{padding:6px 12px;background:#07c160;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:8px}
.btn-del{padding:6px 12px;background:#f44336;color:#fff;border:none;border-radius:4px;cursor:pointer}
.back{
  display:inline-block;
  padding:8px 16px;
  background:#e2a8c0;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
  margin-bottom:20px;
}
.back:hover{background:#d897b0}
</style>
</head>
<body>
<div class="box">
  <a href="index.html" class="back">← 返回首页</a>
  <h2>用户审核管理</h2>
  <div id="userList"></div>
</div>

<script>
// 从URL获取管理员密码
const urlParams = new URLSearchParams(window.location.search);
const adminPwd = urlParams.get('pwd');
if(!adminPwd){
    alert("请从首页管理员按钮进入，输入密码访问");
    location.href = "index.html";
}

// 加载用户列表
async function loadUser(){
  const res = await fetch(`/api/admin/userlist?adminPwd=${adminPwd}`)
  const data = await res.json();
  if(data.code !== 200){
      alert(data.msg);
      location.href = "index.html";
      return;
  }
  const box = document.getElementById("userList");
  if(data.data.length===0){
    box.innerHTML = "<p>暂无注册用户</p>";
    return;
  }
  let html = "";
  data.data.forEach(u=>{
    html += `
    <div class="item">
      <div>
        <p>用户名：${u.username}</p>
        <p>手机号：${u.phone||"无"} QQ：${u.qq||"无"} 微信：${u.wechat||"无"}</p>
        <p>注册时间：${u.registerTime} 状态：${u.status==="pending"?"待审核":"已通过"}</p>
      </div>
      <div>
        ${u.status==="pending"?`<button class="btn-pass" onclick="pass('${u.username}')">审核通过</button>`:""}
        <button class="btn-del" onclick="del('${u.username}')">删除账号</button>
      </div>
    </div>
    `
  })
  box.innerHTML = html;
}

// 审核通过
async function pass(name){
  const res = await fetch("/api/admin/pass",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({adminPwd,username:name})
  })
  const d = await res.json();
  alert(d.msg);
  loadUser();
}

// 删除用户
async function del(name){
  if(!confirm("确定删除该用户？")) return;
  const res = await fetch("/api/admin/del",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({adminPwd,username:name})
  })
  const d = await res.json();
  alert(d.msg);
  loadUser();
}

window.onload = loadUser;
</script>
</body>
</html>
