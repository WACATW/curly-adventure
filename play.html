<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏加载中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        /* 全屏游戏框架 */
        #gameFrame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
        .tip {
            color: #fff;
            text-align: center;
            padding-top: 30px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="tip" id="loadingTip">正在加载游戏...</div>
    <iframe id="gameFrame"></iframe>

    <script>
        // 获取地址栏传递的游戏链接
        function getUrlParam(name) {
            const params = new URLSearchParams(location.search);
            return params.get(name);
        }
        const targetUrl = decodeURIComponent(getUrlParam("url"));
        const frame = document.getElementById("gameFrame");
        const tip = document.getElementById("loadingTip");

        if (targetUrl) {
            frame.src = targetUrl;
            // 加载完成隐藏提示文字
            frame.onload = () => {
                tip.style.display = "none";
            };
        } else {
            tip.innerText = "未获取到游戏地址，请返回大厅重新选择";
        }
    </script>
</body>
</html>
