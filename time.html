<!DOCTYPE html>
<html> 
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="generator" content="RocketCake">
	<title>时间倒计时 - 一只猫的小家</title>
	<link rel="stylesheet" type="text/css" href="time_html.css?h=e11564e0">
	<style>
		/* 新增时间页面样式 */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Microsoft Yahei", sans-serif;
		}

		body {
			background: linear-gradient(to bottom right, #fde2e4, #e2dafa, #d7f0e6);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 2rem;
		}

		.container {
			width: 90%;
			max-width: 600px;
			background: rgba(255, 255, 255, 0.92);
			border-radius: 16px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
			padding: 2.5rem;
			text-align: center;
		}

		.title {
			font-size: 1.8rem;
			color: #2d3748;
			margin-bottom: 2rem;
			position: relative;
		}

		.title::after {
			content: "";
			display: block;
			width: 70px;
			height: 3px;
			background-color: #e2a8c0;
			margin: 0.8rem auto 0;
			border-radius: 3px;
		}

		.countdown {
			font-size: 2.5rem;
			color: #e2a8c0;
			margin: 2rem 0;
			font-weight: 600;
		}

		.back-btn {
			padding: 0.8rem 1.8rem;
			border-radius: 8px;
			border: none;
			background: linear-gradient(135deg, #f8bbd0 0%, #c1b3f0 100%);
			color: white;
			font-size: 1rem;
			cursor: pointer;
			transition: all 0.3s ease;
			text-decoration: none;
		}

		.back-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(248, 187, 208, 0.3);
		}
	</style>
</head>
<body>
	<div class="container">
		<h2 class="title">时间倒计时</h2>
		<div class="countdown" id="countdown">00:00:00</div>
		<p>设置目标时间：<input type="datetime-local" id="targetTime"></p>
		<button onclick="startCountdown()" class="back-btn">开始倒计时</button>
		<br><br>
		<a href="index.html" class="back-btn">返回主页</a>
	</div>

	<script>
		// 倒计时逻辑
		let countdownTimer;
		function startCountdown() {
			const targetTime = new Date(document.getElementById('targetTime').value);
			if (!targetTime) {
				alert("请选择目标时间！");
				return;
			}

			clearInterval(countdownTimer);
			countdownTimer = setInterval(() => {
				const now = new Date();
				const diff = targetTime - now;

				if (diff <= 0) {
					clearInterval(countdownTimer);
					document.getElementById('countdown').textContent = "时间到！";
					return;
				}

				// 计算时分秒
				const hours = Math.floor(diff / (1000 * 60 * 60));
				const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
				const seconds = Math.floor((diff % (1000 * 60)) / 1000);

				// 补零
				const formatTime = (num) => num.toString().padStart(2, '0');
				document.getElementById('countdown').textContent = 
					`${formatTime(hours)}:${formatTime(minutes)}:${formatTime(seconds)}`;
			}, 1000);
		}
	</script>
</body>
</html>
